<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CORRO - Upsell & Smile Report</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Instrument+Sans:wght@300;400;500;600&display=swap');

    :root {
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #4a4a4a;
      --color-text-tertiary: #808080;
      --color-border-primary: #e5e7eb;
      --color-border-tertiary: #f0f0f0;
      --color-bg-light: #f9fafb;
      --brand-blue: #185FA5;
      --brand-green: #0F6E56;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #f4f4f5;
      padding: 40px 20px;
      font-family: 'Instrument Sans', sans-serif;
      color: var(--color-text-primary);
    }

    .w {
      max-width: 1180px;
      margin: 0 auto;
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 25px rgba(0,0,0,0.05);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--color-border-primary);
      gap: 20px;
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--brand-blue);
      margin-bottom: 8px;
    }

    .rname {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: #111;
    }

    .rperiod {
      font-size: 13px;
      color: var(--color-text-tertiary);
      margin-top: 8px;
    }

    .badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 8px 16px;
      border-radius: 8px;
      background: var(--color-bg-light);
      border: 1px solid var(--color-border-primary);
      color: var(--color-text-secondary);
      white-space: nowrap;
    }

    .filters {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 10px;
      margin-bottom: 24px;
      background: var(--color-bg-light);
      padding: 14px;
      border: 1px solid var(--color-border-primary);
      border-radius: 12px;
    }

    select, button {
      font-family: 'Instrument Sans', sans-serif;
      border: 1px solid var(--color-border-primary);
      background: white;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
    }

    button {
      cursor: pointer;
      background: #111;
      color: white;
      font-weight: 600;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 2rem;
      background: var(--color-bg-light);
      padding: 5px;
      border-radius: 10px;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: var(--color-text-tertiary);
      border-radius: 8px;
      transition: all .2s ease;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .tab.active {
      background: white;
      color: var(--brand-blue);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .sec-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-text-tertiary);
      margin: 35px 0 15px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sec-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-border-tertiary);
    }

    .kb {
      background: white;
      border: 1px solid var(--color-border-primary);
      border-radius: 14px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .grid5 {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr 1.1fr;
      align-items: center;
    }

    .kbh {
      padding: 12px 20px;
      background: var(--color-bg-light);
      border-bottom: 1px solid var(--color-border-primary);
    }

    .kmr {
      padding: 20px;
    }

    .kh {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-text-tertiary);
    }

    .kh.r {
      text-align: right;
    }

    .kname {
      font-size: 15px;
      font-weight: 600;
      color: #111;
      margin-bottom: 4px;
    }

    .kdesc {
      font-size: 12px;
      color: var(--color-text-tertiary);
      line-height: 1.4;
    }

    .kv {
      text-align: right;
      font-size: 19px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .compare-row {
      border-top: 1px solid var(--color-border-tertiary);
      padding: 12px 20px;
    }

    .compare-label {
      display: flex;
      gap: 8px;
      align-items: center;
      color: var(--color-text-tertiary);
      font-size: 11px;
    }

    .tag {
      font-size: 10px;
      font-weight: 800;
      padding: 3px 8px;
      border-radius: 6px;
      letter-spacing: 0.02em;
    }

    .mom {
      background: #eff6ff;
      color: #1e40af;
    }

    .yoy {
      background: #fefce8;
      color: #854f0b;
    }

    .vval {
      text-align: right;
    }

    .pill {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      display: inline-block;
    }

    .pd {
      background: #fef2f2;
      color: #991b1b;
    }

    .pu {
      background: #f0fdf4;
      color: #166534;
    }

    .na {
      font-size: 10px;
      background: #f3f4f6;
      color: #6b7280;
      padding: 3px 8px;
      border-radius: 6px;
      display: inline-block;
      white-space: nowrap;
    }

    .bench {
      display: inline-block;
      font-size: 11px;
      background: #fffbeb;
      color: #92400e;
      padding: 4px 10px;
      border-radius: 6px;
      margin-top: 8px;
      border: 1px solid #fde68a;
    }

    .loading {
      padding: 20px;
      text-align: center;
      color: var(--color-text-tertiary);
    }

    .ins {
      margin-top: 30px;
      border-radius: 14px;
      padding: 24px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      font-size: 14px;
      color: var(--color-text-secondary);
      line-height: 1.6;
    }

    .il {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .ttbl {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin-top: 15px;
    }

    .ttbl th {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--color-text-tertiary);
      padding: 12px 10px;
      border-bottom: 2px solid var(--color-border-primary);
      text-align: right;
    }

    .ttbl th:first-child {
      text-align: left;
    }

    .ttbl td {
      padding: 14px 10px;
      border-bottom: 1px solid var(--color-border-tertiary);
      text-align: right;
      font-size: 13px;
    }

    .ttbl td:first-child {
      text-align: left;
      font-weight: 500;
    }

    .ttbl tr:hover td {
      background: var(--color-bg-light);
    }

    .hl {
      font-weight: 600;
      background: #f9fafb;
    }

    @media (max-width: 900px) {
      .w {
        padding: 24px;
        overflow-x: auto;
      }

      .top-bar {
        flex-direction: column;
      }

      .filters {
        grid-template-columns: 1fr;
      }

      .kb {
        min-width: 920px;
      }

      .kv {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <div class="w">
    <div class="top-bar">
      <div>
        <div class="brand">Corro Shop</div>
        <div class="rname">Upsell & Smile Report</div>
        <div class="rperiod" id="periodText">Loading report data...</div>
      </div>

      <div class="badge" id="updatedBadge">Weekly</div>
    </div>

    <div class="filters">
      <select id="yearFilter"></select>

      <select id="quarterFilter">
        <option value="Q1">Q1: Jan–Mar</option>
        <option value="Q2">Q2: Apr–Jun</option>
        <option value="Q3">Q3: Jul–Sep</option>
        <option value="Q4">Q4: Oct–Dec</option>
      </select>

      <button onclick="render()">Load Report</button>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('upsell')">Upsell</div>
      <div class="tab" onclick="switchTab('smile')">Smile.io</div>
    </div>

    <div id="status" class="loading">Loading...</div>

    <div class="panel active" id="panel-upsell">
      <div id="upsellContent"></div>
    </div>

    <div class="panel" id="panel-smile">
      <div id="smileContent"></div>
    </div>
  </div>

  <script>
    let report = null;
    let activeTab = 'upsell';

    fetch('report-data.json?ts=' + Date.now())
      .then(response => {
        if (!response.ok) {
          throw new Error('Missing report-data.json. Run the GitHub Action first.');
        }

        return response.json();
      })
      .then(data => {
        report = data;
        setupFilters();
        render();
      })
      .catch(error => {
        document.getElementById('status').textContent = 'Error: ' + error.message;
      });

    function setupFilters() {
      const years = [...new Set(report.monthly.map(row => row.year))]
        .filter(year => year >= 2026)
        .sort();

      const yearSelect = document.getElementById('yearFilter');

      yearSelect.innerHTML = years
        .map(year => `<option value="${year}">${year}</option>`)
        .join('');

      const currentYear = Math.max(...years);
      yearSelect.value = currentYear;

      const currentMonth = new Date().getMonth() + 1;

      let quarter = 'Q1';

      if (currentMonth >= 4 && currentMonth <= 6) quarter = 'Q2';
      if (currentMonth >= 7 && currentMonth <= 9) quarter = 'Q3';
      if (currentMonth >= 10) quarter = 'Q4';

      document.getElementById('quarterFilter').value = quarter;
      document.getElementById('updatedBadge').textContent = 'Updated ' + formatDate(report.generatedAt);
    }

    function render() {
      if (!report) return;

      const year = Number(document.getElementById('yearFilter').value);
      const quarter = document.getElementById('quarterFilter').value;
      const months = monthsForQuarter(year, quarter);

      document.getElementById('status').style.display = 'none';
      document.getElementById('periodText').textContent = `${quarter} ${year}`;

      renderUpsell(months, quarter, year);
      renderSmile(months, quarter, year);
    }

    function monthsForQuarter(year, quarter) {
      const monthNumbers = {
        Q1: [1, 2, 3],
        Q2: [4, 5, 6],
        Q3: [7, 8, 9],
        Q4: [10, 11, 12]
      }[quarter];

      return monthNumbers.map(number => ({
        year,
        monthNumber: number,
        key: `${year}-${String(number).padStart(2, '0')}`,
        label: new Date(Date.UTC(year, number - 1, 1)).toLocaleString('en-US', {
          month: 'short',
          year: 'numeric',
          timeZone: 'UTC'
        })
      }));
    }

    function rowByMonth(key) {
      return report.monthly.find(row => row.month === key) || {};
    }

    function prevMonthKey(year, monthNumber) {
      let previousYear = year;
      let previousMonth = monthNumber - 1;

      if (previousMonth === 0) {
        previousYear = year - 1;
        previousMonth = 12;
      }

      return `${previousYear}-${String(previousMonth).padStart(2, '0')}`;
    }

    function previousQuarterMonths(months) {
      const first = months[0];
      const firstMonth = first.monthNumber;

      let previousYear = first.year;
      let previousMonthNumbers = [];

      if (firstMonth === 1) {
        previousYear = first.year - 1;
        previousMonthNumbers = [10, 11, 12];
      } else if (firstMonth === 4) {
        previousMonthNumbers = [1, 2, 3];
      } else if (firstMonth === 7) {
        previousMonthNumbers = [4, 5, 6];
      } else if (firstMonth === 10) {
        previousMonthNumbers = [7, 8, 9];
      }

      return previousMonthNumbers.map(number => ({
        year: previousYear,
        monthNumber: number,
        key: `${previousYear}-${String(number).padStart(2, '0')}`,
        label: new Date(Date.UTC(previousYear, number - 1, 1)).toLocaleString('en-US', {
          month: 'short',
          year: 'numeric',
          timeZone: 'UTC'
        })
      }));
    }

    function buildKpi(label, description, field, format, suffix, months, quarterTotalFn) {
      const monthly = {};
      const mom = {};
      const yoy = {};

      months.forEach((month, index) => {
        const current = Number(rowByMonth(month.key)[field] || 0);

        monthly[month.key] = current;

        const previousKey = index === 0
          ? prevMonthKey(month.year, month.monthNumber)
          : months[index - 1].key;

        const previous = Number(rowByMonth(previousKey)[field] || 0);
        mom[month.key] = percentChange(current, previous);

        const yoyKey = `${month.year - 1}-${String(month.monthNumber).padStart(2, '0')}`;
        const yoyValue = Number(rowByMonth(yoyKey)[field] || 0);
        yoy[month.key] = percentChange(current, yoyValue);
      });

      const quarterTotal = quarterTotalFn
        ? quarterTotalFn(months)
        : months.reduce((sum, month) => {
            return sum + Number(rowByMonth(month.key)[field] || 0);
          }, 0);

      const previousQuarter = previousQuarterMonths(months);

      const previousQuarterTotal = quarterTotalFn
        ? quarterTotalFn(previousQuarter)
        : previousQuarter.reduce((sum, month) => {
            return sum + Number(rowByMonth(month.key)[field] || 0);
          }, 0);

      const yoyMonths = months.map(month => ({
        ...month,
        year: month.year - 1,
        key: `${month.year - 1}-${String(month.monthNumber).padStart(2, '0')}`
      }));

      const yoyQuarterTotal = quarterTotalFn
        ? quarterTotalFn(yoyMonths)
        : yoyMonths.reduce((sum, month) => {
            return sum + Number(rowByMonth(month.key)[field] || 0);
          }, 0);

      return {
        label,
        description,
        field,
        format,
        suffix: suffix || '',
        monthly,
        mom,
        yoy,
        quarterTotal,
        quarterMom: percentChange(quarterTotal, previousQuarterTotal),
        quarterYoy: percentChange(quarterTotal, yoyQuarterTotal)
      };
    }

    function renderUpsell(months, quarter, year) {
      const kpis = [
        buildKpi('Upsell Revenue', 'Total USD generated by upsell', 'upsell_revenue', 'currency', '', months),
        buildKpi('Items Sold (Upsell)', 'Products sold via upsell offer', 'upsell_items', 'number', ' pcs', months),
        buildKpi('Conversion Rate', '% of orders where upsell was accepted', 'conversion_rate', 'percent', '', months, monthsList => {
          const orders = monthsList.reduce((sum, month) => {
            return sum + Number(rowByMonth(month.key).total_orders || 0);
          }, 0);

          const withUpsell = monthsList.reduce((sum, month) => {
            return sum + Number(rowByMonth(month.key).orders_with_upsell || 0);
          }, 0);

          return orders ? withUpsell / orders : 0;
        }),
        buildKpi('Avg. Upsell Value', 'Average USD per upsell item sold', 'average_upsell_value', 'currency', '', months, monthsList => {
          const revenue = monthsList.reduce((sum, month) => {
            return sum + Number(rowByMonth(month.key).upsell_revenue || 0);
          }, 0);

          const items = monthsList.reduce((sum, month) => {
            return sum + Number(rowByMonth(month.key).upsell_items || 0);
          }, 0);

          return items ? revenue / items : 0;
        }),
        buildKpi('Total Orders Processed', 'All store orders — base for conversion rate', 'total_orders', 'number', '', months),
        buildKpi('Orders with Upsell', 'Orders where at least one upsell was accepted', 'orders_with_upsell', 'number', '', months)
      ];

      document.getElementById('upsellContent').innerHTML =
        kpis.map(kpi => renderKpiCard(kpi, months, `${quarter} ${year}`, 'upsell')).join('') +
        '<div class="ins"><div class="il" style="color:var(--brand-blue);">Key insight</div>MoM compares each month against the previous month. YoY compares against the same month in the previous year.</div>';
    }

    function renderSmile(months, quarter, year) {
      const members = [
        buildKpi('New Members', 'Customers who joined the program', 'new_members', 'number', '', months),
        buildKpi('Total Customer Base', 'Cumulative loyalty members', 'total_customer_base', 'number', '', months, monthsList => {
          return Number(rowByMonth(monthsList[monthsList.length - 1].key).total_customer_base || 0);
        })
      ];

      const points = [
        buildKpi('Points Earned', 'Total points accumulated by customers', 'points_earned', 'number', '', months),
        buildKpi('Points Redeemed', 'Points used by customers to claim rewards', 'points_redeemed', 'number', '', months),
        buildKpi('Redemption Rate', '% of earned points redeemed', 'redemption_rate', 'percent', '', months, monthsList => {
          const earned = monthsList.reduce((sum, month) => {
            return sum + Number(rowByMonth(month.key).points_earned || 0);
          }, 0);

          const redeemed = monthsList.reduce((sum, month) => {
            return sum + Number(rowByMonth(month.key).points_redeemed || 0);
          }, 0);

          return earned ? redeemed / earned : 0;
        })
      ];

      const sales = [
        buildKpi('Sales Influenced by Smile', 'Revenue from Smile influenced orders', 'sales_influenced', 'currency', '', months)
      ];

      document.getElementById('smileContent').innerHTML =
        '<div class="sec-label">Members</div>' +
        members.map(kpi => renderKpiCard(kpi, months, `${quarter} ${year}`, 'smile')).join('') +
        '<div class="sec-label">Points & Redemption</div>' +
        points.map(kpi => renderKpiCard(kpi, months, `${quarter} ${year}`, 'smile')).join('') +
        '<div class="sec-label">Sales Impact</div>' +
        sales.map(kpi => renderKpiCard(kpi, months, `${quarter} ${year}`, 'smile')).join('') +
        '<div class="sec-label">Program trend since launch</div>' +
        renderProgramTrend() +
        '<div class="ins"><div class="il" style="color:var(--brand-green);">Key insight</div>Smile YoY appears only when the same month exists in the previous year. Before that, the report shows “No 2025 Smile data”.</div>';
    }

    function renderProgramTrend() {
      const rows = report.monthly
        .filter(row => row.month >= '2025-09')
        .sort((a, b) => a.month.localeCompare(b.month));

      if (!rows.length) {
        return '<div class="ins">No Smile trend data found.</div>';
      }

      return `
        <div style="overflow-x:auto;">
          <table class="ttbl">
            <thead>
              <tr>
                <th>Month</th>
                <th>New members</th>
                <th>Total base</th>
                <th>Pts earned</th>
                <th>Pts redeemed</th>
                <th>Redeem rate</th>
                <th>Sales influenced</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(row => `
                <tr class="${row.year === 2026 ? 'hl' : ''}">
                  <td>${escapeHtml(row.month)}</td>
                  <td>${formatNumber(row.new_members)}</td>
                  <td>${formatNumber(row.total_customer_base)}</td>
                  <td>${formatNumber(row.points_earned)}</td>
                  <td>${formatNumber(row.points_redeemed)}</td>
                  <td>${formatPercent(row.redemption_rate)}</td>
                  <td>${formatCurrency(row.sales_influenced)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderKpiCard(kpi, months, totalLabel, sourceType) {
      const headers = months
        .map(month => `<div class="kh r">${month.label}</div>`)
        .join('');

      const values = months.map(month => {
        let extra = '';

        if (kpi.field === 'redemption_rate') {
          const value = Number(kpi.monthly[month.key] || 0);

          if (value > 0 && value < 0.25) {
            extra = ' <span class="pill pd" style="font-size:10px;">Low</span>';
          }

          if (value >= 0.25 && value <= 0.35) {
            extra = ' <span class="pill pu" style="font-size:10px;">Benchmark</span>';
          }
        }

        return `<div class="kv">${formatValue(kpi.monthly[month.key], kpi.format, kpi.suffix)}${extra}</div>`;
      }).join('');

      const mom = months
        .map(month => `<div class="vval">${renderChange(kpi.mom[month.key], 'N/A')}</div>`)
        .join('');

      const yoyFallback = sourceType === 'smile'
        ? 'No 2025 Smile data'
        : 'N/A';

      const yoy = months
        .map(month => `<div class="vval">${renderChange(kpi.yoy[month.key], yoyFallback)}</div>`)
        .join('');

      const bench = kpi.field === 'redemption_rate'
        ? '<div class="bench">Benchmark sweet spot: 25–35%</div>'
        : '';

      return `
        <div class="kb">
          <div class="kbh grid5">
            <div class="kh">KPI</div>
            ${headers}
            <div class="kh r">${totalLabel} Total</div>
          </div>

          <div class="kmr grid5">
            <div>
              <div class="kname">${escapeHtml(kpi.label)}</div>
              <div class="kdesc">${escapeHtml(kpi.description)}</div>
              ${bench}
            </div>
            ${values}
            <div class="kv">${formatValue(kpi.quarterTotal, kpi.format, kpi.suffix)}</div>
          </div>

          <div class="compare-row grid5">
            <div class="compare-label">
              <span class="tag mom">MoM</span>
              <span>vs previous month / previous quarter</span>
            </div>
            ${mom}
            <div class="vval">${renderChange(kpi.quarterMom, 'N/A')}</div>
          </div>

          <div class="compare-row grid5">
            <div class="compare-label">
              <span class="tag yoy">YoY</span>
              <span>vs same month last year</span>
            </div>
            ${yoy}
            <div class="vval">${renderChange(kpi.quarterYoy, yoyFallback)}</div>
          </div>
        </div>
      `;
    }

    function percentChange(current, previous) {
      current = Number(current || 0);
      previous = Number(previous || 0);

      if (!previous) return null;

      return (current - previous) / previous;
    }

    function renderChange(value, fallbackLabel = 'N/A') {
      if (value === null || value === undefined || isNaN(value)) {
        return `<span class="na">${fallbackLabel}</span>`;
      }

      const cls = value >= 0 ? 'pu' : 'pd';
      const arrow = value >= 0 ? '↑' : '↓';
      const sign = value >= 0 ? '+' : '-';

      return `<span class="pill ${cls}">${arrow} ${sign}${formatPercentAbs(value)}</span>`;
    }

    function formatValue(value, format, suffix) {
      if (format === 'currency') return formatCurrency(value);
      if (format === 'percent') return formatPercent(value);

      return formatNumber(value) + (suffix || '');
    }

    function formatCurrency(value) {
      const number = Number(value || 0);
      const hasCents = Math.abs(number % 1) > 0.004;

      return '$' + number.toLocaleString('en-US', {
        minimumFractionDigits: hasCents ? 2 : 0,
        maximumFractionDigits: 2
      });
    }

    function formatNumber(value) {
      return Number(value || 0).toLocaleString('en-US', {
        maximumFractionDigits: 0
      });
    }

    function formatPercent(value) {
      return (Number(value || 0) * 100).toLocaleString('en-US', {
        minimumFractionDigits: 1,
        maximumFractionDigits: 1
      }) + '%';
    }

    function formatPercentAbs(value) {
      return Math.abs(Number(value || 0) * 100).toLocaleString('en-US', {
        minimumFractionDigits: 1,
        maximumFractionDigits: 1
      }) + '%';
    }

    function formatDate(value) {
      return new Date(value).toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      });
    }

    function switchTab(name) {
      activeTab = name;

      document.querySelectorAll('.tab').forEach((tab, index) => {
        tab.classList.toggle('active', ['upsell', 'smile'][index] === name);
      });

      document.querySelectorAll('.panel').forEach(panel => {
        panel.classList.toggle('active', panel.id === 'panel-' + name);
      });
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
</body>
</html>
